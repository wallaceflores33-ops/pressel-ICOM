<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:   #0D1B3E;
    --navy2:  #112050;
    --blue:   #1A3A7A;
    --accent: #2563EB;
    --white:  #FFFFFF;
    --gray:   #CBD5E1;
    --green:  #25D366;
    --green2: #1DA851;
  }

  html, body {
    height: 100%;
    background: var(--navy);
    font-family: 'Barlow', sans-serif;
    color: var(--white);
    overflow-x: hidden;
  }

  /* BG com textura sutil */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(37,99,235,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(37,99,235,0.10) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    gap: 0;
  }

  /* Linha topo decorativa */
  .top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--accent), #60A5FA, var(--accent));
    z-index: 10;
  }

  /* Logo */
  .logo-wrap {
    margin-bottom: 48px;
    animation: fadeDown 0.7s ease both;
  }

  .logo-wrap img {
    width: 220px;
    max-width: 70vw;
    filter: drop-shadow(0 4px 24px rgba(37,99,235,0.35));
  }

  /* Card central */
  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 20px;
    padding: 52px 48px 48px;
    max-width: 520px;
    width: 100%;
    text-align: center;
    backdrop-filter: blur(12px);
    box-shadow: 0 24px 80px rgba(0,0,0,0.4);
    animation: fadeUp 0.8s 0.15s ease both;
  }

  .eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #60A5FA;
    margin-bottom: 20px;
  }

  .headline {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(34px, 6vw, 52px);
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -0.01em;
    color: var(--white);
    margin-bottom: 16px;
  }

  .headline span {
    color: #60A5FA;
  }

  .sub {
    font-size: 16px;
    font-weight: 400;
    color: var(--gray);
    line-height: 1.6;
    margin-bottom: 40px;
  }

  /* Divisor */
  .divider {
    width: 48px;
    height: 3px;
    background: var(--accent);
    border-radius: 2px;
    margin: 0 auto 36px;
  }

  /* Botão WhatsApp */
  .btn-whatsapp {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: var(--green);
    color: #fff;
    font-family: 'Barlow', sans-serif;
    font-size: 17px;
    font-weight: 700;
    text-decoration: none;
    padding: 18px 36px;
    border-radius: 50px;
    width: 100%;
    max-width: 380px;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 8px 32px rgba(37,211,102,0.30);
    animation: pulse 2.5s 1.2s ease-in-out infinite;
  }

  .btn-whatsapp:hover {
    background: var(--green2);
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(37,211,102,0.45);
    animation: none;
  }

  .btn-whatsapp:active {
    transform: translateY(0);
  }

  .btn-whatsapp svg {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
  }

  /* Badge confiança */
  .trust {
    margin-top: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: rgba(255,255,255,0.45);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
  }

  .trust svg {
    width: 14px;
    height: 14px;
    opacity: 0.5;
  }

  /* Rodapé */
  .footer {
    margin-top: 48px;
    font-size: 12px;
    color: rgba(255,255,255,0.2);
    text-align: center;
    animation: fadeUp 1s 0.4s ease both;
  }

  /* Animações */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 8px 32px rgba(37,211,102,0.30); }
    50%       { box-shadow: 0 8px 48px rgba(37,211,102,0.55); }
  }

  /* Mobile */
  @media (max-width: 480px) {
    .card {
      padding: 40px 28px 36px;
    }
    .logo-wrap img {
      width: 180px;
    }
  }
</style>
</head>
<body>

<div class="top-bar"></div>

<div class="page">

  <!-- Logo -->
  <div class="logo-wrap">
    <img src="https://i.imgur.com/placeholder.png" alt="iCom Motors"
         onerror="this.style.display='none'; document.getElementById('logo-text').style.display='block'">
    <!-- fallback texto caso a logo não carregue -->
    <div id="logo-text" style="display:none; font-family:'Barlow Condensed',sans-serif; font-size:42px; font-weight:900; letter-spacing:-0.02em; color:#fff;">
      i<span style="color:#2563EB;">C</span>o<span style="color:#2563EB;">M</span>
      <span style="display:block; font-size:14px; font-weight:700; letter-spacing:0.3em; color:#60A5FA; margin-top:4px;">MOTORS</span>
    </div>
  </div>

  <!-- Card -->
  <div class="card">
    <p class="eyebrow">Atendimento especializado</p>

    <h1 class="headline">
      Fale com nosso<br><span>consultor</span>
    </h1>

    <div class="divider"></div>

    <p class="sub">
      Tire suas dúvidas, simule financiamentos e encontre o veículo ideal para você com a ajuda de um especialista.
    </p>

    <a class="btn-whatsapp"
       href="https://wa.me/551231996370"
       target="_blank"
       rel="noopener"
       onclick="fbq('track', 'Lead');">
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      Falar com consultor agora
    </a>

    <div class="trust">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7l-9-5z"/></svg>
      Atendimento seguro e sem compromisso
    </div>
  </div>

  <div class="footer">© iCom Motors · Todos os direitos reservados</div>

</div>

<script>
  // Carrega a logo da imagem local enviada (base64 embed via JS)
  // Como não temos servidor, usamos o fallback de texto por padrão
  // Ao hospedar, substitua o src da img pela URL real da logo
  document.querySelector('.logo-wrap img').style.display = 'none';
  document.getElementById('logo-text').style.display = 'block';
</script>

</body>
</html>
